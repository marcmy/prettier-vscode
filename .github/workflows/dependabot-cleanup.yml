name: Dependabot cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/dependabot-cleanup.yml

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create log directory
        run: mkdir -p cleanup-logs

      - name: Refresh root lockfile only
        shell: bash
        run: |
          set +e
          npm update --package-lock-only > cleanup-logs/root-update.txt 2>&1
          echo $? > cleanup-logs/root-update.exit
          npm audit fix --package-lock-only > cleanup-logs/root-audit-fix.txt 2>&1
          echo $? > cleanup-logs/root-audit-fix.exit
          npm audit --json > cleanup-logs/root-audit.json 2>&1
          echo $? > cleanup-logs/root-audit.exit
          exit 0

      - name: Explain remaining alert packages
        shell: bash
        run: |
          set +e
          for package in js-yaml serialize-javascript uuid picomatch minimatch; do
            npm explain "$package" > "cleanup-logs/explain-$package.txt" 2>&1
            echo $? > "cleanup-logs/explain-$package.exit"
          done
          exit 0

      - name: Install and verify root dependencies
        shell: bash
        run: |
          set +e
          npm ci > cleanup-logs/root-ci.txt 2>&1
          echo $? > cleanup-logs/root-ci.exit
          npm run check-types > cleanup-logs/check-types.txt 2>&1
          echo $? > cleanup-logs/check-types.exit
          npm run lint > cleanup-logs/lint.txt 2>&1
          echo $? > cleanup-logs/lint.exit
          npm run compile > cleanup-logs/compile.txt 2>&1
          echo $? > cleanup-logs/compile.exit
          exit 0

      - name: Record diff
        shell: bash
        run: |
          git diff --check > cleanup-logs/diff-check.txt 2>&1 || true
          git diff --stat > cleanup-logs/diff-stat.txt 2>&1 || true
          git diff --name-only > cleanup-logs/diff-files.txt 2>&1 || true

      - name: Upload root lockfile and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependabot-root-lockfile-diagnostics
          path: |
            package-lock.json
            cleanup-logs
          if-no-files-found: error
