name: Dependabot cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/dependabot-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the cleanup branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            test-fixtures/plugin-tailwindcss/package-lock.json

      - name: Update root dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm pkg set 'devDependencies.esbuild=0.28.1' 'overrides.diff=8.0.3' 'overrides.serialize-javascript=7.0.5'
          npm update --package-lock-only
          npm audit fix --package-lock-only
          npm audit --audit-level=low

      - name: Update Tailwind fixture dependencies
        shell: bash
        working-directory: test-fixtures/plugin-tailwindcss
        run: |
          set -euo pipefail
          npm update --package-lock-only
          npm audit fix --package-lock-only
          npm audit --audit-level=low

      - name: Verify root dependency tree
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run check-types
          npm run lint
          npm run compile

      - name: Verify Tailwind fixture dependency tree
        working-directory: test-fixtures/plugin-tailwindcss
        run: npm ci

      - name: Validate dependency-only diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          unexpected="$(git diff --name-only | grep -vE '^(package.json|package-lock.json|test-fixtures/plugin-tailwindcss/package-lock.json)$' || true)"
          if [[ -n "$unexpected" ]]; then
            echo "Unexpected changed files:"
            echo "$unexpected"
            exit 1
          fi
          git diff --stat

      - name: Commit verified dependency updates
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json test-fixtures/plugin-tailwindcss/package-lock.json
          git commit -m "chore: update vulnerable dependencies"
          git push origin HEAD:${{ github.head_ref }}
