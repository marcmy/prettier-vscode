name: Dependabot cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/dependabot-cleanup.yml

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            test-fixtures/plugin-tailwindcss/package-lock.json

      - name: Refresh root dependency tree
        shell: bash
        run: |
          set -euo pipefail
          npm install --save-dev --package-lock-only 'esbuild@^0.28.1'
          npm update --package-lock-only
          npm audit fix --package-lock-only

      - name: Refresh Tailwind test fixture dependency tree
        shell: bash
        working-directory: test-fixtures/plugin-tailwindcss
        run: |
          set -euo pipefail
          npm update --package-lock-only
          npm audit fix --package-lock-only

      - name: Install root dependencies exactly
        run: npm ci

      - name: Check types
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Verify root audit
        run: npm audit --audit-level=low

      - name: Install and audit Tailwind fixture
        shell: bash
        working-directory: test-fixtures/plugin-tailwindcss
        run: |
          set -euo pipefail
          npm ci
          npm audit --audit-level=low

      - name: Validate changed files
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          unexpected="$(git diff --name-only | grep -vE '^(package.json|package-lock.json|test-fixtures/plugin-tailwindcss/package-lock.json)$' || true)"
          if [[ -n "$unexpected" ]]; then
            echo "Unexpected changed files:"
            echo "$unexpected"
            exit 1
          fi
          git diff --stat

      - name: Upload reviewed dependency files
        uses: actions/upload-artifact@v4
        with:
          name: dependabot-cleanup-files
          path: |
            package.json
            package-lock.json
            test-fixtures/plugin-tailwindcss/package-lock.json
          if-no-files-found: error
